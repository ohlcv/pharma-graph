<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>药学知识图谱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
</head>
<body>

<div id="app">

  <!-- ── Top bar ──────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar__logo">
      <div class="topbar__logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="2.5"/>
          <circle cx="5"  cy="19" r="2.5"/>
          <circle cx="19" cy="19" r="2.5"/>
          <line x1="12" y1="7.5"  x2="5"  y2="16.5"/>
          <line x1="12" y1="7.5"  x2="19" y2="16.5"/>
          <line x1="5"  y1="16.5" x2="19" y2="16.5"/>
        </svg>
      </div>
      <div class="topbar__brand">
        <span class="topbar__brand-name">药学知识图谱</span>
        <span class="topbar__brand-sub">PHARMA KNOWLEDGE GRAPH</span>
      </div>
    </div>
    <div class="topbar__search-center">
      <div class="topbar__search-wrap">
        <svg class="topbar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="toolbar-search" class="topbar__search-input" type="text" placeholder="搜索节点…" autocomplete="off" spellcheck="false"/>
      </div>
    </div>
    <span class="topbar__badge">
      <span class="topbar__badge-dot topbar__badge-dot--loading" id="badge-dot"></span>
      <span id="badge-text">loading…</span>
    </span>
  </header>

  <!-- ── Toolbar ─────────────────────────────────────────────────────── -->
  <div class="toolbar">
    <div class="toolbar__group">
      <button id="btn-cose"         class="btn layout-btn active" onclick="runLayout('cose')"><span>COSE</span></button>
      <button id="btn-concentric"   class="btn layout-btn" onclick="runLayout('concentric')"><span>同心圆</span></button>
      <button id="btn-circle"       class="btn layout-btn" onclick="runLayout('circle')"><span>环形</span></button>
      <button id="btn-grid"         class="btn layout-btn" onclick="runLayout('grid')"><span>网格</span></button>
      <button id="btn-dagre"        class="btn layout-btn" onclick="runLayout('dagre')"><span>Dagre</span></button>
      <button id="btn-breadthfirst" class="btn layout-btn" onclick="runLayout('breadthfirst')"><span>广度</span></button>
      <button id="btn-euler"        class="btn layout-btn" onclick="runLayout('euler')"><span>Euler</span></button>
    </div>

    <div class="toolbar__sep"></div>

    <div class="toolbar__group">
      <button id="btn-fit"    class="btn" onclick="fitGraph()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        <span>适应</span>
      </button>
      <button id="btn-random" class="btn" onclick="randomize()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        <span>随机</span>
      </button>
      <button id="btn-reset" class="btn" onclick="resetAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
        <span>重置</span>
      </button>
      <button id="btn-pulse"  class="btn" onclick="animatePulse()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        <span>脉冲</span>
      </button>
    </div>

    <div class="toolbar__sep"></div>

    <button id="btn-tour" class="btn" onclick="toggleTour()" title="漫游探索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
      </svg>
      <span>漫游</span>
    </button>

    <button id="btn-music" class="btn" title="播放背景音乐">
      <svg id="music-icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor" stroke="none"/>
        <rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor" stroke="none"/>
      </svg>
      <svg id="music-icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
      </svg>
      <span id="music-label">播放</span>
    </button>

    <div class="toolbar__sep"></div>

    <button id="btn-sidebar-toggle" class="btn" onclick="toggleSidebar()" title="切换侧栏">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
      </svg>
    </button>
  </div>

  <!-- ── Mobile: expand bar ─────────────────────────────────────────────── -->
  <div id="sheet-expand-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>

  <!-- ── Main ───────────────────────────────────────────────────────── -->
  <div id="main">

    <!-- Floating edge strip (inside #main so it can be controlled by .sidebar-hidden) -->
    <div id="sidebar-strip" class="sidebar-strip" onclick="toggleSidebar()" title="展开侧栏">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>

    <div id="cy"></div>

    <!-- ── Left floating node detail ─────────────────────────────────── -->
    <div id="node-panel" class="node-panel" role="complementary" aria-label="节点详情">
      <div class="node-panel__header" id="node-panel-header" onpointerdown="startPanelDrag(event)">
        <span class="node-panel__title">节点详情</span>
        <button class="node-panel__close" onclick="closeNodePanel()" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="node-panel__body">
        <div class="node-panel__hero">
          <span id="lp-type-badge" class="lp-type-badge"></span>
          <span id="lp-node-name" class="lp-node-name"></span>
        </div>
        <div id="lp-fields" class="lp-fields"></div>
        <div id="lp-adj-label" class="lp-adj-label" style="display:none">
          <span class="lp-field-key">邻居</span>
        </div>
        <div id="lp-adj" class="lp-adj"></div>
      </div>
    </div>

    <!-- ── Desktop sidebar ───────────────────────────────────────────── -->
    <aside id="sidebar">

      <!-- Node types -->
      <div class="sidebar-section" data-section="types">
        <div class="sidebar-section__head" onclick="toggleSection('types')">
          <span class="sidebar-section__title">节点类型</span>
          <svg class="sidebar-section__chevron open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="sidebar-section__body" id="body-types">
          <div class="node-type-grid">
            <div class="node-type-item" onclick="highlightShape('ellipse')">
              <div class="node-type-item__dot" style="background:#818cf8"></div>
              <span class="node-type-item__label">概念</span>
            </div>
            <div class="node-type-item" onclick="highlightShape('round-rectangle')">
              <div class="node-type-item__dot" style="background:#67e8f9"></div>
              <span class="node-type-item__label">药物</span>
            </div>
            <div class="node-type-item" onclick="highlightShape('diamond')">
              <div class="node-type-item__dot" style="background:#fca5a5;transform:rotate(45deg);border-radius:2px;width:9px;height:9px"></div>
              <span class="node-type-item__label">疾病</span>
            </div>
            <div class="node-type-item" onclick="highlightShape('barrel')">
              <div class="node-type-item__dot" style="background:#c4b5fd"></div>
              <span class="node-type-item__label">成分</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <!-- Stats + Layout description merged -->
      <div class="sidebar-section" data-section="stats">
        <div class="sidebar-section__head" onclick="toggleSection('stats')">
          <span class="sidebar-section__title">图谱与布局</span>
          <svg class="sidebar-section__chevron open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="sidebar-section__body" id="body-stats">
          <div class="stat-list">
            <div class="stat-card">
              <span class="stat-card__label">节点</span>
              <span class="stat-card__value stat-card__value--accent" id="stat-nodes">—</span>
            </div>
            <div class="stat-card">
              <span class="stat-card__label">边</span>
              <span class="stat-card__value stat-card__value--cyan" id="stat-edges">—</span>
            </div>
            <div class="stat-card">
              <span class="stat-card__label">选中</span>
              <span class="stat-card__value stat-card__value--amber" id="stat-selected">0</span>
            </div>
          </div>
          <div class="layout-info">
            <div class="layout-info__header">
              <span class="layout-info__label">布局</span>
              <span class="layout-info__badge" id="stat-layout">COSE</span>
            </div>
            <span id="layout-desc" class="layout-info__desc">COSE — 力学弹簧布局，模拟物理排斥与吸引，自动产生紧凑聚类结构。</span>
          </div>
        </div>
      </div>

      <!-- Layout parameters -->
      <div class="sidebar-section" data-section="params">
        <div class="sidebar-section__head" onclick="toggleSection('params')">
          <span class="sidebar-section__title">布局参数</span>
          <svg class="sidebar-section__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="sidebar-section__body" id="body-params" style="display:none">
          <div id="layout-params" class="layout-params"></div>
          <button id="apply-params-btn" class="btn btn--apply" onclick="applyLayoutParams()" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span>应用参数</span>
          </button>
        </div>
      </div>

      <!-- Shortcuts -->
      <div class="sidebar-section" data-section="shortcuts">
        <div class="sidebar-section__head" onclick="toggleSection('shortcuts')">
          <span class="sidebar-section__title">快捷键</span>
          <svg class="sidebar-section__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="sidebar-section__body" id="body-shortcuts" style="display:none">
          <div class="shortcuts-list">
            <div class="shortcut-item"><span class="key">点击</span><span class="shortcut-item__label">选中节点</span></div>
            <div class="shortcut-item"><span class="key">右键</span><span class="shortcut-item__label">删除节点</span></div>
            <div class="shortcut-item"><span class="key">双击</span><span class="shortcut-item__label">锁定节点</span></div>
            <div class="shortcut-item"><span class="key">F</span><span class="shortcut-item__label">适应画布</span></div>
            <div class="shortcut-item"><span class="key">R</span><span class="shortcut-item__label">随机分布</span></div>
            <div class="shortcut-item"><span class="key">Del</span><span class="shortcut-item__label">删除选中</span></div>
            <div class="shortcut-item"><span class="key">Esc</span><span class="shortcut-item__label">重置视图</span></div>
            <div class="shortcut-item"><span class="key">Ctrl+A</span><span class="shortcut-item__label">全选</span></div>
          </div>
        </div>
      </div>

      <div class="sidebar-credit">by meow</div>

    </aside><!-- /desktop sidebar -->

  </div><!-- /main -->

  <!-- ── Mobile: always-visible close handle (outside sheet so it's visible when closed) -->
  <div id="sheet-close-bar" onclick="closeBottomSheet()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>

  <!-- ── Mobile bottom sheet ────────────────────────────────────────────── -->
  <!-- Backdrop dims the graph when sheet is open -->
  <div id="sheet-backdrop" onclick="closeBottomSheet()"></div>

  <div id="bottom-sheet" class="bottom-sheet" role="dialog" aria-label="控制面板">

    <!-- ── Search ──────────────────────────────────────────── -->
    <div class="bs-section">
      <div class="bs-search-wrap">
        <svg class="bs-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="bs-search-input" class="bs-search-input" type="text" placeholder="搜索节点…" autocomplete="off" spellcheck="false"/>
      </div>
    </div>

    <!-- ── Stats row ──────────────────────────────────────── -->
    <div class="bs-section">
      <div class="bs-section__label">图谱信息</div>
      <div class="bs-stats-row">
        <div class="bs-stat"><span class="bs-stat__val bs-stat__val--accent" id="bs-stat-nodes">—</span><span class="bs-stat__label">节点</span></div>
        <div class="bs-stat"><span class="bs-stat__val bs-stat__val--cyan" id="bs-stat-edges">—</span><span class="bs-stat__label">边</span></div>
        <div class="bs-stat"><span class="bs-stat__val bs-stat__val--amber" id="bs-stat-selected">0</span><span class="bs-stat__label">选中</span></div>
        <div class="bs-stat"><span class="bs-stat__val" id="bs-stat-layout">COSE</span><span class="bs-stat__label">布局</span></div>
      </div>
    </div>

    <!-- ── Quick action row ─────────────────────────────────── -->
    <div class="bs-section">
      <div class="bs-section__label">快捷操作</div>
      <div class="bs-quick-row">
        <button class="bs-quick-btn" onclick="fitGraph()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          <span>适应</span>
        </button>
        <button class="bs-quick-btn" onclick="randomize()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          <span>随机</span>
        </button>
        <button class="bs-quick-btn" onclick="animatePulse()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          <span>脉冲</span>
        </button>
        <button class="bs-quick-btn" onclick="resetAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
          <span>重置</span>
        </button>
        <button class="bs-quick-btn" id="bs-btn-music" title="播放背景音乐">
          <svg id="bs-music-icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor" stroke="none"/>
            <rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor" stroke="none"/>
          </svg>
          <svg id="bs-music-icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
          </svg>
          <span>音乐</span>
        </button>
        <button class="bs-quick-btn" id="bs-btn-tour" title="漫游探索" onclick="toggleTour()">
          <svg id="bs-tour-icon-stop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <rect x="6" y="6" width="12" height="12" rx="1" fill="currentColor" stroke="none"/>
          </svg>
          <svg id="bs-tour-icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
          </svg>
          <span>漫游</span>
        </button>
      </div>
    </div>

    <!-- ── Layout buttons ─────────────────────────────── -->
    <div class="bs-section">
      <div class="bs-section__label">图谱布局</div>
      <div class="bs-layout-grid">
        <button class="bs-layout-btn layout-btn active" id="bs-btn-cose" onclick="runLayout('cose')">COSE</button>
        <button class="bs-layout-btn layout-btn" id="bs-btn-concentric" onclick="runLayout('concentric')">同心圆</button>
        <button class="bs-layout-btn layout-btn" id="bs-btn-circle" onclick="runLayout('circle')">环形</button>
        <button class="bs-layout-btn layout-btn" id="bs-btn-grid" onclick="runLayout('grid')">网格</button>
        <button class="bs-layout-btn layout-btn" id="bs-btn-dagre" onclick="runLayout('dagre')">Dagre</button>
        <button class="bs-layout-btn layout-btn" id="bs-btn-breadthfirst" onclick="runLayout('breadthfirst')">广度</button>
        <button class="bs-layout-btn" id="bs-btn-euler" onclick="runLayout('euler')">Euler</button>
      </div>
    </div>

    <!-- ── Node type chips ───────────────────────────── -->
    <div class="bs-section">
      <div class="bs-section__label">节点类型</div>
      <div class="bs-chips">
        <div class="bs-chip" onclick="highlightShape('ellipse')">
          <div class="bs-chip__dot" style="background:#818cf8;border-radius:50%"></div>
          <span>概念</span>
        </div>
        <div class="bs-chip" onclick="highlightShape('round-rectangle')">
          <div class="bs-chip__dot" style="background:#67e8f9"></div>
          <span>药物</span>
        </div>
        <div class="bs-chip" onclick="highlightShape('diamond')">
          <div class="bs-chip__dot" style="background:#fca5a5;transform:rotate(45deg);border-radius:2px;width:9px;height:9px"></div>
          <span>疾病</span>
        </div>
        <div class="bs-chip" onclick="highlightShape('barrel')">
          <div class="bs-chip__dot" style="background:#c4b5fd"></div>
          <span>成分</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Mobile FAB (hidden — expand bar replaces it) ─────────────────────── -->
  <button id="fab" class="fab" onclick="toggleBottomSheet()" aria-label="打开面板">
    <svg id="fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- ── Tour panel ─────────────────────────────────────────────────── -->
  <!-- ── Tour status bar ───────────────────────────────────────────────── -->
  <div id="tour-status" class="tour-status" style="display:none">
    <div class="tour-status__left">
      <button class="tour-status__badge" id="tour-badge-btn" onclick="tourPause()" title="暂停/继续 (P)">
        <svg id="tour-badge-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
        </svg>
        <svg id="tour-badge-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="10"/>
          <rect x="6" y="4" width="4" height="16" fill="currentColor" stroke="none"/>
          <rect x="14" y="4" width="4" height="16" fill="currentColor" stroke="none"/>
        </svg>
        <span id="tour-badge-text">漫游中</span>
      </button>
      <span id="tour-cycle-badge" class="tour-status__cycle" style="display:none">第 0 轮</span>
      <div class="tour-status__info">
        <span id="tour-depth-badge">第 0 层</span>
        <span class="tour-status__sep">|</span>
        <span id="tour-count-badge">已探索 0 个节点</span>
      </div>
      <div class="tour-status__sliders">
        <label id="tour-interval-lbl"><span id="tour-interval-val">3.0s</span>
          <input type="range" id="tour-interval" min="1000" max="10000" step="500" value="3000">
        </label>
        <label id="tour-depth-lbl"><span id="tour-depth-val">不限</span>
          <input type="range" id="tour-maxdepth" min="1" max="10" step="1" value="10">
        </label>
      </div>
    </div>
  </div>

</div><!-- /app -->

<audio id="bgm" preload="none"></audio>

<script type="module" src="/src/ui/main.ts"></script>
</body>
